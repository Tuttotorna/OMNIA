name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test / python-3.12
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy matplotlib jsonschema

      - name: Install current package
        run: |
          python -m pip install -e .

      - name: Run required DOI ownership test
        run: |
          python -m pytest -q tests/test_doi_ownership.py

      - name: Run full test suite
        run: |
          python -m pytest -q
